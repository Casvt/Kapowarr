version: "3.3"
services:
  kapowarr:
    container_name: kapowarr
    image: mrcas/kapowarr:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - "kapowarr-db:/app/db"
      - "/path/to/download_folder:/app/temp_downloads"
      - "/path/to/comics:/comics"
    ports:
      - 5656:5656
  kapowarr-dev:
    build:
      context: .
      dockerfile: ./Dockerfile
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - ENV=development
      - LOG_LEVEL=DEBUG
    volumes:
      - "kapowarr-data:/data"
      - "/path/to/download_folder:/app/temp_downloads"
      - "/path/to/comics:/comics"
      - "./backend/:/app/backend"
      - "./frontend/:/app/frontend"
    ports:
      - 5656:5656
volumes:
  kapowarr-db:
  kapowarr-data:
