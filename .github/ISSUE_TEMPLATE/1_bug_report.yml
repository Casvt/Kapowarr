name: Bug Report
description: Create a report for a bug or inconsistency that you found
labels: ["bug"]
body:
- type: checkboxes
  attributes:
    label: Is there an existing issue for this?
    description: Please search to see if an issue already exists for the bug you encountered.
    options:
    - label: I have searched the existing issues
      required: true

- type: textarea
  attributes:
    label: Description of the bug
    description: A concise description of what the bug is.
    render: markdown
  validations:
    required: true

- type: textarea
  attributes:
    label: Steps to reproduce
    description: Concise steps to reproduce the behaviour.
    placeholder: |
      1. Go to '...'
      2. Click on '....'
      3. Scroll down to '....'
      4. See error
    render: markdown
  validations:
    required: true

- type: textarea
  attributes:
    label: Expected behaviour
    description: What should've happened, or did you expect to happen?
    render: markdown
  validations:
    required: true

- type: textarea
  attributes:
    label: Additional context
    description: >-
      Paste logs, screenshots and/or extra information here. When sharing logs,
      please set the log level to DEBUG at Settings -> General -> Logging and
      reproduce the bug. That way the logs you share contain the most information.
      If there are a lot of logs, or you aren't sure where the relevant information
      is, then download the complete log file at the same place in the settings
      and upload it here.
    render: markdown
  validations:
    required: false

- type: textarea
  attributes:
    label: Environment and version info
    placeholder: Go to System -> Status -> About, click "Copy" and paste the value here. Also share your OS and/or browser if relevant.
    render: markdown
  validations:
    required: true
